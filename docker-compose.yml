services:
  mutter:
    build: .
    ports:
      - "7860:7860"
    env_file: .env
    volumes:
      - ./data:/app/data
    depends_on:
      - chromadb

  chromadb:
    image: chromadb/chroma:1.5.9
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  chroma_data:
